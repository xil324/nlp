      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        classes:
        - id: other
          name: 其他问题
        - id: ml
          name: 机器学习问题
        - id: llm
          name: 大模型问题
        instruction: '你是一个专业的意图分类器。请根据用户问题，判断其属于哪个类别。

          ## 分类规则

          ### other - 其他问题
          包括但不限于：
          - 日常闲聊（你好、天气、周末愉快等）
          - 生活娱乐（电影、音乐、美食等）
          - 不涉及AI/机器学习/大模型的通用问题

          ### ml - 机器学习问题
          包括但不限于：
          - 传统机器学习算法：线性回归、逻辑回归、决策树、随机森林、SVM、KNN、K-means、DBSCAN、PCA
          - 深度学习基础：CNN、RNN、LSTM、GRU
          - 机器学习概念：梯度下降、损失函数、过拟合、欠拟合、特征工程、交叉验证、模型评估、训练集/测试集

          ### llm - 大模型问题
          包括但不限于：
          - 大语言模型：LLM、GPT、BERT、Llama、Claude
          - 模型架构：Transformer、Attention机制、多头注意力、位置编码
          - 大模型技术：RAG、向量数据库、Embedding、Prompt工程、微调/预训练、Agent、LangChain
          - 大模型应用：语义搜索、文本生成、代码生成、多模态

          ## 重要提示
          1. 如果问题同时涉及多个领域，选择最核心、最匹配的分类
          2. 关键词优先级：大模型相关 > 机器学习相关 > 其他
          3. 严格按照用户问题判断，不要添加主观猜测

          ## 输出要求
          只输出分类ID（other/ml/llm），不要输出分类名称或任何解释文字。'
        model:
          completion_params:
            temperature: 0.05
          mode: chat
          name: qwen3.5-plus
